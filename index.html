<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patagonia 360</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  background:#eaeaea;
  font-family:'Segoe UI', sans-serif;
}

.wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.phone{
  width:340px;
  min-height:580px;
  background:#021a10;
  border-radius:36px;
  padding:30px 20px;
  color:white;
  position:relative;
}

.title{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  text-align:center;
  margin-bottom:10px;
}

.logo{
  width:140px;
  margin:10px auto;
  display:block;
}

.subtitle{
  color:#8aaa98;
  margin-bottom:30px;
  text-align:center;
}

button{
  width:100%;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.card{
  background:#ffffff0a;
  border:1px solid #ffffff20;
  color:white;
}

.primary{
  background:#22d68a;
  color:#022318;
}

#map{
  height:180px;
  margin-top:15px;
  border-radius:12px;
}

.arrow{
  text-align:center;
  font-size:40px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="title">Preview interactiva · Patagonia 360</div>

<div class="phone">

<!-- LOGO -->
<img class="logo"
src="https://raw.githubusercontent.com/patagonia360estudio/demo-3D/main/imagen/LogoV2.png">

<div class="subtitle">Experiencias Inmersivas</div>

<!-- BOTONES -->
<button class="card" onclick="goTo('hotel')">Hoteles</button>
<button class="card" onclick="goTo('paseos')">Paseos</button>
<button class="card" onclick="goTo('shopping')">Shoppings</button>

<button class="primary" onclick="showCreator()">
+ Crear tu recorrido
</button>

<!-- MAPA -->
<div id="map"></div>

<!-- DISTANCIA -->
<div id="dist" style="text-align:center;margin-top:10px;"></div>

<!-- FLECHA -->
<div class="arrow" id="arrow">↑</div>

<!-- ACCION -->
<button id="actionBtn" class="primary">Cargando...</button>

</div>
</div>

<script>

// COORDENADAS DEMO (pueden venir de foto GPS después)
var poi = {
  lat: -41.1335,
  lng: -71.3103
};

var user = {lat:0,lng:0};
var map;

// GEOLOCALIZACIÓN
navigator.geolocation.getCurrentPosition(function(pos){

  user.lat = pos.coords.latitude;
  user.lng = pos.coords.longitude;

  initMap();
  updateDistance();

}, function(){
  alert("Activá GPS para usar la experiencia");
});

// MAPA
function initMap(){
  map = L.map('map').setView([user.lat, user.lng], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  L.marker([user.lat, user.lng]).addTo(map).bindPopup("Estás acá");

  L.marker([poi.lat, poi.lng]).addTo(map).bindPopup("Destino");

  L.polyline([[user.lat,user.lng],[poi.lat,poi.lng]], {color:'#22d68a'}).addTo(map);
}

// DISTANCIA
function updateDistance(){
  let d = getDistance(user.lat,user.lng,poi.lat,poi.lng);

  document.getElementById("dist").innerText = "Distancia: " + d;

  let btn = document.getElementById("actionBtn");

  if(parseInt(d) > 150){
    btn.innerText = "Reservar ahora";
  } else {
    btn.innerText = "Ir ahora";
  }
}

// FORMULA DISTANCIA
function getDistance(lat1, lon1, lat2, lon2){
  var R = 6371;
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLon = (lon2-lon1) * Math.PI/180;

  var a =
    Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) *
    Math.sin(dLon/2);

  var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  var d = R * c;

  return (d*1000).toFixed(0);
}

// FLECHA ORIENTACION
window.addEventListener("deviceorientation", function(e){
  let dir = e.alpha;
  document.getElementById("arrow").style.transform =
    "rotate(" + dir + "deg)";
});

// BOTONES
function goTo(type){
  alert("Entrando a: " + type);
}

function showCreator(){
  alert("🚀 Modo creador activado (próximo paso)");
}

</script>

</body>
</html>
