<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patagonia 360</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020b07;
  color:white;
}

/* CONTENEDOR */
.app{
  max-width:420px;
  margin:auto;
  min-height:100vh;
  background:#04140d;
  position:relative;
}

/* LOGO */
.logo{
  width:120px;
  margin:20px auto;
  display:block;
}

/* BOTONES */
.btn{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  font-weight:600;
}

.btn-primary{
  background:#22d68a;
  color:#021a10;
}

.btn-secondary{
  background:#ffffff0a;
  color:#fff;
  border:1px solid #ffffff20;
}

/* TARJETAS */
.card{
  background:#0d1f16;
  border:1px solid #1e3a28;
  border-radius:16px;
  padding:16px;
  margin:16px;
}

/* FLECHA AR */
#ar-direction-arrow{
  position:fixed;
  top:60%;
  left:50%;
  transform:translate(-50%,-50%) rotate(0deg);
  font-size:60px;
  color:#22d68a;
  z-index:9999;
  text-shadow:0 0 40px rgba(34,214,138,1);
  pointer-events:none;
}
</style>
</head>

<body>

<div class="app">

<!-- HOME -->
<div id="screen-home">
  <img id="logo" class="logo">

  <div class="card">
    <h2>Patagonia 360</h2>
    <p>Experiencias inmersivas</p>

    <button class="btn btn-secondary" onclick="goHotel()">Hoteles</button>
  </div>
</div>

<!-- HOTEL -->
<div id="screen-hotel" style="display:none">

  <button onclick="goHome()">← Volver</button>

  <div class="card">
    <h2>Hotel Demo</h2>

    <!-- BOTÓN RESERVA -->
    <button class="btn btn-primary" onclick="reserveService()">
      🛎 Reservar antes de ir
    </button>

    <!-- BOTÓN NAVEGAR -->
    <button class="btn btn-secondary" onclick="startNavigation()">
      🧭 Ir ahora
    </button>
  </div>
</div>

<!-- NAV -->
<div id="screen-nav" style="display:none">
  <button onclick="goHotel()">← Volver</button>

  <div class="card">
    <h2 id="nav-title">Destino</h2>
    <p id="nav-dist">Calculando...</p>

    <button class="btn btn-primary" onclick="startAR()">
      🚀 Abrir AR
    </button>
  </div>
</div>

<!-- AR -->
<div id="screen-ar" style="display:none">
  <button onclick="goNav()">← Cerrar AR</button>

  <div id="ar-direction-arrow">↑</div>

  <div class="card">
    <h2 id="ar-title">Destino</h2>
    <p id="ar-dist"></p>

    <button class="btn btn-primary">✔ Llegué</button>
  </div>
</div>

</div>

<script>

/* ======================
   ESTADO GLOBAL
====================== */
const APP = {
  userLat:null,
  userLng:null,
  deviceHeading:null,
  svc:{
    name:"Salón Bustillo",
    lat:-41.1335,
    lng:-71.3103
  }
};

/* ======================
   LOGO
====================== */
function loadLogo(){
  document.getElementById("logo").src =
  "https://cdn.jsdelivr.net/gh/patagonia360estudio/demo-3D/imagen/LogoV2.png";
}

/* ======================
   NAVEGACIÓN
====================== */
function goHome(){
  show("home");
}
function goHotel(){
  show("hotel");
}
function goNav(){
  show("nav");
}
function startNavigation(){
  show("nav");
}
function startAR(){
  show("ar");
}

function show(id){
  ["home","hotel","nav","ar"].forEach(s=>{
    document.getElementById("screen-"+s).style.display="none";
  });
  document.getElementById("screen-"+id).style.display="block";
}

/* ======================
   RESERVA
====================== */
function reserveService(){
  alert("Reserva enviada ✔️");
}

/* ======================
   GPS
====================== */
function startGPS(){
  navigator.geolocation.watchPosition(pos=>{
    APP.userLat = pos.coords.latitude;
    APP.userLng = pos.coords.longitude;
    updateDistances();
  });
}

/* ======================
   DISTANCIA
====================== */
function distance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);

  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ======================
   RUMBO
====================== */
function bearing(lat1,lon1,lat2,lon2){
  const dLon=(lon2-lon1)*Math.PI/180;
  lat1=lat1*Math.PI/180;
  lat2=lat2*Math.PI/180;

  const y=Math.sin(dLon)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-
          Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);

  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

/* ======================
   ACTUALIZAR UI
====================== */
function updateDistances(){

  if(APP.userLat===null) return;

  const dist = distance(APP.userLat,APP.userLng,APP.svc.lat,APP.svc.lng);

  document.getElementById("nav-dist").innerText =
    dist.toFixed(2)+" km";

  document.getElementById("ar-dist").innerText =
    dist.toFixed(2)+" km";

  updateARArrow();
}

/* ======================
   FLECHA AR
====================== */
function updateARArrow(){

  const arrow=document.getElementById("ar-direction-arrow");

  if(!arrow || APP.userLat===null) return;

  const bear = bearing(APP.userLat,APP.userLng,APP.svc.lat,APP.svc.lng);

  let rot=bear;

  if(APP.deviceHeading!==null){
    rot=(bear-APP.deviceHeading+360)%360;
  }

  arrow.style.transform =
    `translate(-50%,-50%) rotate(${rot}deg)`;
}

/* ======================
   SENSOR
====================== */
function initOrientation(){
  window.addEventListener("deviceorientation",(e)=>{
    if(e.alpha!==null){
      APP.deviceHeading=e.alpha;
    }
  });
}

/* ======================
   INIT
====================== */
window.onload=()=>{
  loadLogo();
  startGPS();
  initOrientation();
};

</script>

</body>
</html>
