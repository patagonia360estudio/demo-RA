<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patagonia 360</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #021a10;
  --surface: #0a2415;
  --border: #143d20;
  --green: #22d68a;
  --gold: #e8b84b;
  --text: #d8eed8;
  --text2: #9abba0;
  --ff-display: 'Syne', sans-serif;
  --ff-body: 'DM Sans', sans-serif;
}

/* 🔥 FIX MOBILE REAL */
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background: radial-gradient(ellipse at 30% 20%, #0d3520 0%, #091608 60%, #040e06 100%);
  font-family: var(--ff-body);
  overflow:auto;
}

/* 🔥 FULLSCREEN REAL */
#app {
  width:100%;
  height:100dvh;
  display:flex;
  flex-direction:column;
  padding:20px;
  padding-bottom: env(safe-area-inset-bottom);
  box-sizing:border-box;
}

/* LOGO */
.logo {
  width:220px;
  max-width:80%;
  margin:20px auto 10px;
  display:block;
}

/* CARDS */
.card {
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
}

.card:hover {
  border-color: var(--green);
}

.icon {
  width:46px;
  height:46px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

.icon-green {
  background: rgba(34,214,138,.15);
}

.icon-gold {
  background: rgba(232,184,75,.15);
}

.icon-blue {
  background: rgba(92,168,232,.15);
}

.title {
  font-weight:700;
  font-size:16px;
}

.sub {
  font-size:12px;
  color: var(--text2);
}

/* BOTON */
.btn {
  margin-top:auto;
  padding:16px;
  border:none;
  border-radius:14px;
  background: var(--green);
  font-weight:700;
  font-size:16px;
  cursor:pointer;
}

/* MAPA */
#map {
  height:200px;
  border-radius:16px;
  margin-top:15px;
}

/* AR FLECHA */
#arrow {
  position:fixed;
  top:55%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:60px;
  color: var(--green);
  pointer-events:none;
}
</style>
</head>

<body>

<div id="app">

  <!-- LOGO -->
  <img class="logo"
       src="https://cdn.jsdelivr.net/gh/patagonia360estudio/demo-3D@main/imagen/LogoV2.png"
       onerror="this.src='https://raw.githubusercontent.com/patagonia360estudio/demo-3D/main/imagen/LogoV2.png'">

  <!-- MODO VIAJERO -->
  <div class="card">
    <div class="icon icon-green">🧭</div>
    <div>
      <div class="title">Modo Viajero</div>
      <div class="sub">Explorá con GPS y AR</div>
    </div>
  </div>

  <!-- CREAR RECORRIDO -->
  <div class="card">
    <div class="icon icon-gold">✏️</div>
    <div>
      <div class="title">Crear tu recorrido</div>
      <div class="sub">Fotos + GPS</div>
    </div>
  </div>

  <!-- GALERIA -->
  <div class="card">
    <div class="icon icon-blue">📚</div>
    <div>
      <div class="title">Mis recorridos</div>
      <div class="sub">Guardados</div>
    </div>
  </div>

  <!-- BOTON -->
  <button class="btn" onclick="startGPS()">+ Crear recorrido</button>

  <!-- MAPA -->
  <div id="map"></div>

</div>

<!-- FLECHA AR -->
<div id="arrow">⬆️</div>

<!-- LIBRERIAS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map, userMarker;

function startGPS() {
  if (!navigator.geolocation) {
    alert("GPS no soportado");
    return;
  }

  navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    if (!map) {
      map = L.map('map').setView([lat, lon], 15);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

      userMarker = L.marker([lat, lon]).addTo(map);
    } else {
      userMarker.setLatLng([lat, lon]);
      map.setView([lat, lon]);
    }

    updateArrow(lat, lon);

  }, err => {
    console.log(err);
  }, {
    enableHighAccuracy: true
  });
}

/* 🔥 FLECHA DINAMICA */
function updateArrow(lat, lon) {

  // destino fake (ejemplo)
  const targetLat = -41.1;
  const targetLon = -71.3;

  const dLon = targetLon - lon;
  const y = Math.sin(dLon) * Math.cos(targetLat);
  const x = Math.cos(lat) * Math.sin(targetLat) -
            Math.sin(lat) * Math.cos(targetLat) * Math.cos(dLon);

  let brng = Math.atan2(y, x);
  brng = brng * 180 / Math.PI;

  document.getElementById("arrow").style.transform =
    `translate(-50%, -50%) rotate(${brng}deg)`;
}
</script>

</body>
</html>
